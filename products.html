<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products | ShopNest</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo">ShopNest</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html" class="active">Products</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav-actions">
      <button class="cart-btn" onclick="window.location.href='cart.html'">🛒 <span id="cart-count">0</span></button>
      <button class="theme-toggle" id="themeToggle">🌙</button>
    </div>
    <button class="hamburger" id="hamburger">☰</button>
  </nav>

  <section class="page-header">
    <h1>Our Products</h1>
    <p>Explore our curated collection of premium items</p>
  </section>

  <section class="products-controls">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search products..." oninput="filterProducts()" />
    </div>
    <div class="filter-bar">
      <select id="categoryFilter" onchange="filterProducts()">
        <option value="all">All Categories</option>
        <option value="electronics">Electronics</option>
        <option value="fashion">Fashion</option>
        <option value="home">Home & Living</option>
        <option value="sports">Sports</option>
      </select>
      <select id="sortFilter" onchange="filterProducts()">
        <option value="default">Sort By</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="rating">Top Rated</option>
      </select>
    </div>
  </section>

  <div class="products-grid wide-grid" id="all-products"></div>

  <footer class="footer">
    <p class="footer-copy">© 2026 ShopNest. Built for ApexPlanet Task-5.</p>
  </footer>

  <script src="js/products-data.js"></script>
  <script src="js/main.js"></script>
  <script>
    let currentProducts = [...productsData];

    function filterProducts() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const category = document.getElementById('categoryFilter').value;
      const sort = document.getElementById('sortFilter').value;

      currentProducts = productsData.filter(p => {
        const matchSearch = p.name.toLowerCase().includes(search) || p.description.toLowerCase().includes(search);
        const matchCat = category === 'all' || p.category === category;
        return matchSearch && matchCat;
      });

      if (sort === 'price-asc') currentProducts.sort((a, b) => a.price - b.price);
      else if (sort === 'price-desc') currentProducts.sort((a, b) => b.price - a.price);
      else if (sort === 'rating') currentProducts.sort((a, b) => b.rating - a.rating);

      renderProducts();
    }

    function renderProducts() {
      const grid = document.getElementById('all-products');
      grid.innerHTML = currentProducts.length
        ? currentProducts.map(p => createProductCard(p)).join('')
        : '<p class="no-results">No products found.</p>';
    }

    renderProducts();
  </script>
</body>
</html>
