<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart | ShopNest</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo">ShopNest</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav-actions">
      <button class="cart-btn active-cart" onclick="window.location.href='cart.html'">🛒 <span id="cart-count">0</span></button>
      <button class="theme-toggle" id="themeToggle">🌙</button>
    </div>
    <button class="hamburger" id="hamburger">☰</button>
  </nav>

  <section class="page-header">
    <h1>Your Cart</h1>
    <p>Review your selected items</p>
  </section>

  <section class="cart-section">
    <div class="cart-grid">
      <div class="cart-items" id="cart-items-container">
        <!-- filled by JS -->
      </div>
      <div class="cart-summary">
        <h3>Order Summary</h3>
        <div class="summary-row"><span>Subtotal</span><span id="subtotal">₹0</span></div>
        <div class="summary-row"><span>Shipping</span><span id="shipping">Free</span></div>
        <div class="summary-row total"><span>Total</span><span id="total">₹0</span></div>
        <button class="btn-primary full-width" onclick="checkout()">Proceed to Checkout</button>
        <a href="products.html" class="btn-outline full-width" style="margin-top:10px;display:block;text-align:center;">Continue Shopping</a>
        <p id="checkout-msg" style="margin-top:12px;color:var(--accent);font-weight:500;"></p>
      </div>
    </div>
  </section>

  <footer class="footer">
    <p class="footer-copy">© 2026 ShopNest. Built for ApexPlanet Task-5.</p>
  </footer>

  <script src="js/products-data.js"></script>
  <script src="js/main.js"></script>
  <script>
    function renderCart() {
      const cart = getCart();
      const container = document.getElementById('cart-items-container');
      if (cart.length === 0) {
        container.innerHTML = '<div class="empty-cart"><p>🛒 Your cart is empty.</p><a href="products.html" class="btn-primary">Shop Now</a></div>';
        document.getElementById('subtotal').textContent = '₹0';
        document.getElementById('total').textContent = '₹0';
        return;
      }
      container.innerHTML = cart.map(item => `
        <div class="cart-item">
          <div class="cart-item-emoji">${item.emoji}</div>
          <div class="cart-item-info">
            <h4>${item.name}</h4>
            <p>₹${item.price.toLocaleString()}</p>
          </div>
          <div class="cart-item-qty">
            <button onclick="changeQty(${item.id}, -1)">−</button>
            <span>${item.qty}</span>
            <button onclick="changeQty(${item.id}, 1)">+</button>
          </div>
          <div class="cart-item-total">₹${(item.price * item.qty).toLocaleString()}</div>
          <button class="remove-btn" onclick="removeFromCart(${item.id})">✕</button>
        </div>
      `).join('');

      const subtotal = cart.reduce((sum, i) => sum + i.price * i.qty, 0);
      document.getElementById('subtotal').textContent = '₹' + subtotal.toLocaleString();
      document.getElementById('total').textContent = '₹' + subtotal.toLocaleString();
    }

    function changeQty(id, delta) {
      let cart = getCart();
      const idx = cart.findIndex(i => i.id === id);
      if (idx > -1) {
        cart[idx].qty += delta;
        if (cart[idx].qty <= 0) cart.splice(idx, 1);
        localStorage.setItem('shopnest_cart', JSON.stringify(cart));
        updateCartCount();
        renderCart();
      }
    }

    function checkout() {
      localStorage.removeItem('shopnest_cart');
      updateCartCount();
      document.getElementById('cart-items-container').innerHTML = '<div class="empty-cart"><p>🎉 Order placed successfully! Thank you for shopping with ShopNest.</p><a href="products.html" class="btn-primary">Continue Shopping</a></div>';
      document.getElementById('checkout-msg').textContent = '';
      document.getElementById('subtotal').textContent = '₹0';
      document.getElementById('total').textContent = '₹0';
    }

    renderCart();
  </script>
</body>
</html>
