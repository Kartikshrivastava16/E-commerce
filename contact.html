<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | ShopNest</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo">ShopNest</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
    <div class="nav-actions">
      <button class="cart-btn" onclick="window.location.href='cart.html'">🛒 <span id="cart-count">0</span></button>
      <button class="theme-toggle" id="themeToggle">🌙</button>
    </div>
    <button class="hamburger" id="hamburger">☰</button>
  </nav>

  <section class="page-header">
    <h1>Get in Touch</h1>
    <p>We'd love to hear from you</p>
  </section>

  <section class="contact-section">
    <div class="contact-grid">
      <div class="contact-info">
        <h2>Contact Info</h2>
        <div class="info-item"><span>📧</span><p>hello@shopnest.com</p></div>
        <div class="info-item"><span>📞</span><p>+91 98765 43210</p></div>
        <div class="info-item"><span>📍</span><p>Bhopal, Madhya Pradesh, India</p></div>
        <div class="info-item"><span>🕐</span><p>Mon–Sat: 9am – 6pm IST</p></div>
      </div>
      <div class="contact-form-wrap">
        <h2>Send a Message</h2>
        <form class="contact-form" onsubmit="submitContact(event)">
          <div class="form-group">
            <label>Your Name</label>
            <input type="text" id="contactName" placeholder="John Doe" required />
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="contactEmail" placeholder="you@email.com" required />
          </div>
          <div class="form-group">
            <label>Subject</label>
            <input type="text" id="contactSubject" placeholder="Order issue, feedback..." />
          </div>
          <div class="form-group">
            <label>Message</label>
            <textarea id="contactMessage" rows="5" placeholder="Type your message here..." required></textarea>
          </div>
          <button type="submit" class="btn-primary full-width">Send Message</button>
          <p class="form-success" id="contactSuccess"></p>
        </form>
      </div>
    </div>
  </section>

  <footer class="footer">
    <p class="footer-copy">© 2026 ShopNest. Built for ApexPlanet Task-5.</p>
  </footer>

  <script src="js/products-data.js"></script>
  <script src="js/main.js"></script>
  <script>
    function submitContact(e) {
      e.preventDefault();
      document.getElementById('contactSuccess').textContent = '✅ Message sent! We\'ll get back to you soon.';
      e.target.reset();
    }
  </script>
</body>
</html>
